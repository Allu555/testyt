<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Youtube Music Player</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Cinematic Ambient Background -->
        <div class="ambient-bg"></div>
        <div class="ambient-light-system"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fab fa-youtube"></i>
                <span>ALLU PLAYER</span>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-target="home-view">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="#" class="nav-item" data-target="search-view">
                    <i class="fas fa-search"></i> Search
                </a>
                <a href="#" class="nav-item" data-target="playlists-view">
                    <i class="fas fa-list-ul"></i> Playlists
                </a>
                <a href="#" class="nav-item" data-target="favorites-view">
                    <i class="fas fa-heart"></i> Favorites
                </a>
                <a href="#" class="nav-item" id="nav-logout" style="margin-top: 16px; color: var(--danger);">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Log Out</span>
                </a>
            </nav>

            <!-- Removed API Key section as we use a local ytmusicapi proxy now -->
            <!-- <div class="api-key-section">
                <input type="password" id="api-key-input" placeholder="Enter your YouTube API Key" autocomplete="new-password" data-lpignore="true" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');">
                <button id="save-api-key" class="btn-primary">Save</button>
            </div> -->
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search View -->
            <section id="search-view" class="view-section hidden">
                <div class="search-container">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search for songs or artists...">
                    </div>
                </div>
                <div class="loader hidden" id="search-loader"></div>
                <div class="results-grid" id="search-results"></div>
            </section>

            <!-- Home View (Recently Played) -->
            <section id="home-view" class="view-section active">
                <div class="spotify-import-section" style="margin-bottom: 30px; display: flex; gap: 12px; align-items: center; background: rgba(29, 185, 84, 0.05); padding: 12px 20px; border-radius: 100px; border: 1px solid rgba(29, 185, 84, 0.2); backdrop-filter: blur(10px); transition: border-color 0.3s ease; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);">
                    <i class="fab fa-spotify" style="color: #1DB954; font-size: 26px; filter: drop-shadow(0 0 10px rgba(29, 185, 84, 0.4));"></i>
                    <input type="text" id="spotify-input" placeholder="Paste Spotify Playlist Link..." style="flex: 1; padding: 12px 20px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: white; font-family: inherit; font-size: 14px; outline: none; transition: all 0.3s ease;" onfocus="this.style.background='rgba(255,255,255,0.12)'; this.style.borderColor='rgba(29, 185, 84, 0.5)';" onblur="this.style.background='rgba(255,255,255,0.06)'; this.style.borderColor='rgba(255,255,255,0.1)';">
                    <button id="spotify-import-btn" style="padding: 12px 32px; border-radius: 100px; background: #1DB954; color: #000; font-weight: 700; font-family: 'Syne', sans-serif; font-size: 14px; letter-spacing: 0.5px; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);" onmouseover="this.style.transform='scale(1.05)'; this.style.background='#1ed760'; this.style.boxShadow='0 6px 20px rgba(29, 185, 84, 0.5)';" onmouseout="this.style.transform='scale(1)'; this.style.background='#1DB954'; this.style.boxShadow='0 4px 15px rgba(29, 185, 84, 0.3)';">Import</button>
                    <div id="spotify-loader" class="loader hidden" style="width: 24px; height: 24px; border-color: rgba(29, 185, 84, 0.3); border-top-color: #1DB954;"></div>
                </div>
                
                <h2>Recently Played</h2>
                <div class="results-grid" id="recent-results"></div>
            </section>

            <!-- Favorites View -->
            <section id="favorites-view" class="view-section hidden">
                <h2>Your Favorites</h2>
                <div class="results-grid" id="favorites-results"></div>
            </section>

            <!-- Playlists View -->
            <section id="playlists-view" class="view-section hidden">
                <h2>Saved Playlists</h2>
                <div class="results-grid" id="playlists-results"></div>
            </section>

            <!-- Playlist Detail View -->
            <section id="playlist-detail-view" class="view-section hidden">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <button id="back-to-playlists-btn" class="icon-btn tooltip-btn" title="Back to Playlists" style="font-size: 20px;"><i class="fas fa-arrow-left"></i></button>
                    <h2 id="detail-playlist-title" style="margin: 0;">Playlist Details</h2>
                    <button id="play-all-detail-btn" class="btn-primary" style="margin-left: auto;"><i class="fas fa-play"></i> Play All</button>
                </div>
                <div class="results-grid" id="playlist-detail-results"></div>
            </section>

            <!-- Fullscreen Now Playing View -->
            <section id="now-playing-view" class="view-section hidden now-playing-overlay">
                <!-- Animated gradient backdrop -->
                <div class="np-backdrop"></div>

                <div class="np-header">
                    <div class="np-logo">NOW PLAYING</div>
                    <div class="np-top-icons">
                        <i class="fas fa-expand tooltip-btn" id="video-fs-btn" title="Full Screen Video"></i>
                        <i class="fas fa-chevron-down np-close-btn" id="close-np-btn" title="Close"></i>
                    </div>
                </div>
                <main class="np-main">
                    <div class="np-content-layout">
                        <div class="np-left-section">
                            <div class="np-art-wrapper" style="position: relative;">
                                <div class="np-art-glow"></div>
                                <img id="np-large-art" src="" alt="Album Art">
                                <div id="ytplayer" style="position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 10;"></div>
                            </div>
                        </div>

                        <div class="np-right-section">
                            <div class="np-track-info">
                                <h1 id="np-title" class="np-title-marquee">Song Title</h1>
                                <p id="np-artist">Artist Name</p>
                            </div>

                            <!-- Inline controls for the NP view -->
                            <div class="np-controls">
                                <div class="np-progress-row">
                                    <span class="np-time np-current-time">0:00</span>
                                    <div class="np-progress-track">
                                        <div class="np-progress-fill"></div>
                                    </div>
                                    <span class="np-time np-total-time">0:00</span>
                                </div>
                                <div class="np-control-buttons">
                                    <button class="np-ctrl-btn" id="np-shuffle-btn" title="Shuffle"><i class="fas fa-random"></i></button>
                                    <button class="np-ctrl-btn" id="np-prev-btn"><i class="fas fa-step-backward"></i></button>
                                    <button class="np-ctrl-btn np-play-btn" id="np-play-pause-btn"><i class="fas fa-play"></i></button>
                                    <button class="np-ctrl-btn" id="np-next-btn"><i class="fas fa-step-forward"></i></button>
                                    <button class="np-ctrl-btn" id="np-repeat-btn" title="Repeat"><i class="fas fa-redo-alt"></i></button>
                                </div>
                            </div>

                            <div class="np-actions-row">
                                <button class="np-action-btn" id="np-fav-btn" title="Add to Favorites"><i class="far fa-heart"></i></button>
                                <button class="np-action-btn" id="np-share-btn" title="Share"><i class="fas fa-share-alt"></i></button>
                                <button class="np-action-btn" id="np-queue-btn" title="Add to Queue"><i class="fas fa-list-ul"></i></button>
                            </div>
                        </div>
                    </div>
                </main>
            </section>
        </main>
        
        <!-- Bottom Player Bar -->
        <footer class="player-bar">
            <!-- Left: Info -->
            <div class="player-left">
                <div class="artwork-placeholder" style="position: relative;" id="toggle-np-btn">
                    <img id="now-playing-img" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
                        alt="Artwork" style="display:none; cursor: pointer;" title="Expand">
                    <i class="fas fa-music placeholder-icon"></i>
                </div>
                <div class="track-info">
                    <div class="track-title" id="now-playing-title">Select a song</div>
                    <div class="track-artist" id="now-playing-channel">--</div>
                </div>
                <button class="icon-btn favorite-btn" id="favorite-current-btn">
                    <i class="far fa-heart"></i>
                </button>
            </div>

            <!-- Middle: Controls -->
            <div class="player-center">
                <div class="progress-container mobile-top-progress">
                    <input type="range" class="progress-bar" id="progress-bar" value="0" min="0" max="100">
                </div>
                <div class="control-buttons">
                    <button class="icon-btn tooltip-btn shuffle-btn" id="shuffle-btn" title="Shuffle"><i class="fas fa-random"></i></button>
                    <button class="icon-btn prev-next-btn" id="prev-btn"><i class="fas fa-step-backward"></i></button>
                    <button class="play-pause-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
                    <button class="icon-btn" id="next-btn-mobile" style="display:none;"><i class="fas fa-step-forward"></i></button>
                    <button class="icon-btn prev-next-btn" id="next-btn"><i class="fas fa-step-forward"></i></button>
                    <button class="icon-btn tooltip-btn repeat-btn" id="repeat-btn" title="Repeat"><i class="fas fa-redo-alt"></i></button>
                </div>
                <div class="time-info desktop-only">
                    <span class="time current-time" id="current-time">0:00</span>
                    <span class="time total-time" id="total-time">0:00</span>
                </div>
            </div>

            <!-- Right: Extra Controls & Volume -->
            <div class="player-right">
                <button class="icon-btn tooltip-btn" id="lyrics-btn" title="Lyrics"><i class="fas fa-microphone"></i></button>
                <button class="icon-btn tooltip-btn" id="queue-btn" title="Queue"><i class="fas fa-list-ul"></i></button>
                <button class="icon-btn tooltip-btn" id="connect-btn" title="Connect to Device"><i class="fas fa-laptop-house"></i></button>
                <div class="volume-controls">
                    <i class="fas fa-volume-up" id="volume-icon" style="cursor:pointer;" title="Mute"></i>
                    <input type="range" class="volume-slider" id="volume-slider" value="100" min="0" max="100">
                </div>
                <button class="icon-btn tooltip-btn" id="fs-toggle-btn" title="Fullscreen"><i class="fas fa-expand-alt"></i></button>
            </div>
        </footer>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay hidden">
        <video class="auth-video-bg" autoplay loop muted playsinline>
            <source src="video/vide.mp4" type="video/mp4">
        </video>
        <div class="auth-video-overlay"></div>
        <div class="auth-card">
            <h1 class="auth-title">Welcome to YT Music Player</h1>
            <p class="auth-subtitle" id="auth-subtitle">Log in to view your playlists</p>

            <form id="auth-form" class="auth-form">
                <input type="text" id="auth-username" placeholder="Username" required autocomplete="username">
                <input type="password" id="auth-password" placeholder="Password" required
                    autocomplete="current-password">
                <p id="auth-error" class="auth-error hidden"></p>
                <button type="submit" id="auth-submit-btn" class="btn-primary auth-submit">Log In</button>
            </form>

            <div class="auth-footer">
                <p id="auth-toggle-text">Don't have an account? <span id="auth-toggle-btn">Sign Up</span></p>
            </div>
        </div>
    </div>

    <!-- Application Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script type="module" src="js/app.js?v=2"></script>
</body>

</html>
